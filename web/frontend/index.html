<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Convertly centralizes file editing, custom DSL automation, and format conversion in one workspace."
    />
    <link rel="icon" type="image/png" href="/transfer.png" />
    <meta name="theme-color" content="#ffffff" />
    <script>
      (() => {
        try {
          localStorage.removeItem("convertly-theme");
          localStorage.removeItem("convertly-light-mode");
          document.documentElement.classList.remove("dark", "light");
          document.documentElement.dataset.theme = "light";
          document.documentElement.style.colorScheme = "light";
        } catch {
          document.documentElement.classList.remove("dark", "light");
          document.documentElement.dataset.theme = "light";
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
    <title>Convertly</title>
  </head>
  <body style="background: #ffffff; color: #000000">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
